# =============================================================================
# Vibe Kanban Kubernetes 部署清单
# 包含：持久化存储(PVC)、应用部署(Deployment)、服务发现(Service)、路由(Ingress)
# =============================================================================

# --- 1. 持久化存储声明 (PVC) ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vk-data-pvc  # 用于存储应用的业务数据
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
# 用于存储应用的配置、缓存和二进制文件
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vk-bin-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
# --- 2. 应用部署对象 (Deployment) ---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vibe-kanban
  labels:
    app: vibe-kanban
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vibe-kanban
  template:
    metadata:
      labels:
        app: vibe-kanban
    spec:
      # --- Init Container: 初始化环境 ---
      # 负责创建文件夹结构，并处理 API Key 的认证逻辑
      initContainers:
      - name: init-vibe-kanban
        image: liukunup/vibe-kanban:latest
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        env:
        - name: TZ
          value: "Asia/Shanghai"
        # --- 可选：配置 API Key (与主容器保持一致) ---
        # - name: OPENAI_API_KEY
        #   value: "sk-..."
        # - name: ANTHROPIC_API_KEY
        #   value: "sk-ant-..."
        # - name: GITHUB_TOKEN
        #   value: "ghp_..."
        command: 
        - sh
        - -c
        - |
          echo "Initializing Vibe Kanban data..."
          mkdir -p /root/.local/share/vibe-kanban
          mkdir -p /root/.vibe-kanban
          
          # --- 登录认证逻辑示例 ---
          # 如果提供了 API Key，可以在这里进行验证或生成配置文件
          
          if [ -n "$GITHUB_TOKEN" ]; then
             echo "Detected GITHUB_TOKEN, configuring git credentials..."
             # 注意：为了让主容器也能使用凭证，需要将其写入共享卷
             # 这里假设我们将 git-credentials 写入到 vk-bin 卷中，并在主容器启动脚本中处理(或软链接)
             # 这里仅做演示，实际需根据应用逻辑调整
             git config --global credential.helper store
             echo "https://oauth2:${GITHUB_TOKEN}@github.com" > /root/.vibe-kanban/.git-credentials
             echo "Git credentials configured."
          fi
          
          # if [ -n "$OPENAI_API_KEY" ]; then
          #    echo "Verifying OpenAI API Key..."
          #    # curl ...
          # fi

          echo "Initialization complete."
        volumeMounts:
        - name: vk-data
          mountPath: /root/.local/share/vibe-kanban
        - name: vk-bin
          mountPath: /root/.vibe-kanban
      # --- 主应用容器 ---
      containers:
      - name: vibe-kanban
        image: liukunup/vibe-kanban:latest
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        ports:
        - containerPort: 8080
        env:
        - name: TZ
          value: "Asia/Shanghai"
        # --- 可选：配置 API Key ---
        # - name: OPENAI_API_KEY
        #   value: "sk-..."
        # - name: ANTHROPIC_API_KEY
        #   value: "sk-ant-..."
        
        volumeMounts:
        - name: vk-data
          mountPath: /root/.local/share/vibe-kanban
        - name: vk-bin
          mountPath: /root/.vibe-kanban

      # --- 调度控制 (可选) ---
      # nodeSelector:
      #   kubernetes.io/os: linux
      # affinity:
      #   # 尽量将 Pod 调度到不同的节点以实现高可用 (如果 replicas > 1)
      #   podAntiAffinity:
      #     preferredDuringSchedulingIgnoredDuringExecution:
      #     - weight: 100
      #       podAffinityTerm:
      #         labelSelector:
      #           matchExpressions:
      #           - key: app
      #             operator: In
      #             values:
      #             - vibe-kanban
      #         topologyKey: kubernetes.io/hostname
      # tolerations:
      # - key: "node-role.kubernetes.io/master"
      #   operator: "Exists"
      #   effect: "NoSchedule"

      volumes:
      - name: vk-data
        persistentVolumeClaim:
          claimName: vk-data-pvc
      - name: vk-bin
        persistentVolumeClaim:
          claimName: vk-bin-pvc
# --- 3. 服务暴露 (Service) ---
---
apiVersion: v1
kind: Service
metadata:
  name: vibe-kanban-service
spec:
  selector:
    app: vibe-kanban
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: LoadBalancer
# --- 4. 外部路由 (Ingress) ---
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vibe-kanban-ingress
  annotations:
    # 示例注解，请根据具体的 Ingress Controller (如 Nginx, Traefik) 进行调整
    # kubernetes.io/ingress.class: nginx
    # nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
  - host: vibe-kanban.local  # 请修改为实际域名
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vibe-kanban-service
            port:
              number: 8080
