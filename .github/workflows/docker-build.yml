name: CI/CD Pipeline for Docker Image

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

env:
  IMAGE_NAME: vibe-kanban

jobs:

  build:
    name: Build Docker Image
    runs-on: ubuntu-24.04
    permissions:
      packages: write
      contents: read
    strategy:
      matrix:
        include:
          - name: node
            version: 22-slim
            dockerfile: Dockerfile.node
            arg: NODE_VERSION
          - name: ubuntu
            version: noble
            dockerfile: Dockerfile.ubuntu
            arg: UBUNTU_VERSION
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            docker.io/${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.name }}-${{ matrix.version }}
            type=raw,value=${{ matrix.name }}-latest
            type=raw,value=latest,enable=${{ matrix.name == 'ubuntu' }}

      - name: Build and Push Docker Images
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ${{ matrix.arg }}=${{ matrix.version }}
            ${{ matrix.name == 'ubuntu' && 'NODE_VERSION=22.x' || '' }}

      - name: Update Docker Hub Repository Description
        if: matrix.name == 'node'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
          repository: ${{ secrets.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}
          readme-filepath: README.md
